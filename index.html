<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Atlas del Grupo</title>
  <meta name="description" content="Un directorio de fantasía con las guaridas y refugios de nuestro grupo de aventureros." />

  <!-- Display/fantasy font for headings & nicknames; falls back to Georgia if offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Leaflet CSS (loaded eagerly; the JS is lazy-loaded only when the map is opened) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="css/styles.css?v=3" />
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">El Atlas del Grupo</h1>
    <p class="site-tagline">Guaridas y refugios de nuestra alegre compañía</p>

    <div class="controls">
      <input
        type="search"
        id="filter-input"
        class="filter-input"
        placeholder="Busca por nombre, historia o etiqueta…"
        aria-label="Buscar ubicaciones"
      />
      <button id="view-toggle" class="view-toggle" type="button" aria-pressed="false">
        <span class="view-toggle__label">Ver mapa</span>
      </button>
    </div>
  </header>

  <main>
    <!-- Galería: la vista inicial por defecto -->
    <section id="gallery-view" aria-label="Galería de ubicaciones">
      <ul id="gallery" class="gallery" aria-live="polite"></ul>
      <p id="empty-state" class="empty-state" hidden>Ninguna ubicación coincide con tu búsqueda.</p>
    </section>

    <!-- Mapa: oculto hasta activarse; Leaflet se monta aquí de forma diferida -->
    <section id="map-view" aria-label="Mapa de ubicaciones" hidden>
      <button id="map-back" class="map-back" type="button">&larr; Volver a la galería</button>
      <div id="map" class="map"></div>
    </section>
  </main>

  <!-- Diálogo de detalle -->
  <dialog id="detail-dialog" class="detail" aria-label="Detalles de la ubicación">
    <button class="detail__close" type="button" data-close-detail aria-label="Cerrar">&times;</button>
    <div id="detail-body" class="detail__body"></div>
  </dialog>

  <footer class="site-footer">
    <p>Hecho para el grupo, por el grupo. Datos del mapa &copy; colaboradores de OpenStreetMap.</p>
  </footer>

  <script src="js/app.js?v=3" defer></script>
</body>
</html>
